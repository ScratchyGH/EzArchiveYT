<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EZARCHIVEYT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
--bg:#0a0a0b;
--bg-2:#111113;
--bg-3:#18181b;
--bg-4:#1e1e22;
--bg-5:#27272c;
--border:#2a2a2f;
--border-2:#333338;
--text:#e4e4e7;
--text-2:#a1a1aa;
--text-3:#71717a;
--text-4:#52525b;
--accent:#4f6ef7;
--accent-dim:#2e3f8f;
--accent-hover:#6b82f9;
--green:#22c55e;
--green-dim:#14532d;
--red:#ef4444;
--red-dim:#450a0a;
--yellow:#eab308;
--yellow-dim:#422006;
--blue:#3b82f6;
--blue-dim:#1e3a5f;
--radius:6px;
--radius-lg:10px;
--sidebar:224px;
--font:'Geist',system-ui,sans-serif;
--mono:'IBM Plex Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:13.5px;line-height:1.5;-webkit-font-smoothing:antialiased;}
button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit;}
a{color:inherit;text-decoration:none;}
img{display:block;}
#app{display:flex;height:100vh;overflow:hidden;}
.sidebar{
width:var(--sidebar);
min-width:var(--sidebar);
height:100vh;
background:var(--bg-2);
border-right:1px solid var(--border);
display:flex;
flex-direction:column;
overflow:hidden;
padding:0;
}
.sidebar-logo{
display:flex;
align-items:center;
gap:8px;
padding:18px 16px 14px;
border-bottom:1px solid var(--border);
margin-bottom:6px;
}
.logo-mark{
background:var(--accent);
color:#fff;
font-size:10px;
font-weight:700;
letter-spacing:.08em;
padding:3px 6px;
border-radius:4px;
font-family:var(--mono);
}
.logo-text{
font-size:12px;
font-weight:600;
letter-spacing:.12em;
color:var(--text-2);
font-family:var(--mono);
}
.sidebar-nav{
display:flex;
flex-direction:column;
gap:1px;
padding:0 8px;
flex:1;
}
.nav-item{
display:flex;
align-items:center;
gap:9px;
padding:7px 10px;
border-radius:var(--radius);
border:none;
background:transparent;
cursor:pointer;
width:100%;
text-align:left;
color:var(--text-3);
transition:background .12s,color .12s;
font-size:13px;
font-weight:450;
}
.nav-item:hover{background:var(--bg-4);color:var(--text-2);}
.nav-item.active{background:var(--bg-4);color:var(--text);}
.nav-icon{display:flex;align-items:center;opacity:.85;}
.nav-label{flex:1;}
.nav-badge{
background:var(--bg-5);
color:var(--text-2);
font-size:10.5px;
font-family:var(--mono);
padding:1px 6px;
border-radius:10px;
border:1px solid var(--border-2);
}
.nav-item.active .nav-badge{background:var(--accent-dim);color:var(--accent-hover);border-color:var(--accent-dim);}
.sidebar-stats{
margin:auto 0 0;
padding:12px 16px;
border-top:1px solid var(--border);
display:flex;
flex-direction:column;
gap:4px;
}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:2px 0;}
.stat-label{font-size:11.5px;color:var(--text-4);}
.stat-val{font-size:12px;font-family:var(--mono);font-weight:500;color:var(--text-2);}
.text-green{color:var(--green)!important;}
.text-red{color:var(--red)!important;}
.sidebar-actions{
padding:10px 8px 14px;
display:flex;
flex-direction:column;
gap:2px;
}
.sidebar-btn{
display:flex;
align-items:center;
gap:8px;
padding:6px 10px;
border-radius:var(--radius);
background:transparent;
border:none;
cursor:pointer;
color:var(--text-3);
width:100%;
text-align:left;
font-size:12px;
transition:background .1s,color .1s;
}
.sidebar-btn:hover{background:var(--bg-4);color:var(--text-2);}
.main{
flex:1;
overflow-y:auto;
display:flex;
flex-direction:column;
min-width:0;
background:var(--bg);
}
.view-wrap{
flex:1;
display:flex;
flex-direction:column;
min-height:0;
padding:28px 32px 40px;
max-width:1280px;
width:100%;
margin:0 auto;
}
.view-header{
display:flex;
align-items:baseline;
gap:12px;
margin-bottom:22px;
}
.view-title{font-size:20px;font-weight:600;color:var(--text);letter-spacing:-.02em;}
.view-sub{font-size:12.5px;color:var(--text-4);}
.add-bar{
background:var(--bg-2);
border:1px solid var(--border);
border-radius:var(--radius-lg);
padding:14px;
margin-bottom:16px;
}
.add-bar-inner{display:flex;gap:10px;align-items:flex-start;}
.add-input-wrap{
flex:1;
display:flex;
align-items:flex-start;
gap:8px;
background:var(--bg-3);
border:1px solid var(--border);
border-radius:var(--radius);
padding:9px 12px;
transition:border-color .15s;
}
.add-input-wrap:focus-within{border-color:var(--accent);}
.add-input-wrap.drag-over{border-color:var(--accent);background:var(--accent-dim);}
.add-input-icon{color:var(--text-4);padding-top:1px;flex-shrink:0;}
.add-input{
flex:1;
background:transparent;
border:none;
outline:none;
resize:none;
color:var(--text);
font-size:13px;
line-height:1.55;
min-height:28px;
max-height:140px;
overflow-y:auto;
}
.add-input::placeholder{color:var(--text-4);}
.toolbar{
display:flex;
align-items:center;
justify-content:space-between;
gap:12px;
margin-bottom:14px;
flex-wrap:wrap;
}
.toolbar-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.toolbar-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.search-wrap{
display:flex;
align-items:center;
gap:7px;
background:var(--bg-3);
border:1px solid var(--border);
border-radius:var(--radius);
padding:5px 10px;
transition:border-color .15s;
color:var(--text-3);
}
.search-wrap:focus-within{border-color:var(--border-2);}
.search-input{background:transparent;border:none;outline:none;color:var(--text);font-size:13px;width:200px;}
.search-input::placeholder{color:var(--text-4);}
.filter-group{display:flex;align-items:center;gap:6px;color:var(--text-4);}
.filter-select{
background:var(--bg-3);
border:1px solid var(--border);
border-radius:var(--radius);
padding:5px 9px;
color:var(--text-2);
font-size:12px;
cursor:pointer;
outline:none;
transition:border-color .15s;
}
.filter-select:focus{border-color:var(--border-2);}
.result-count{font-size:11.5px;color:var(--text-4);font-family:var(--mono);}
.btn-primary{
display:inline-flex;
align-items:center;
gap:6px;
padding:7px 14px;
background:var(--accent);
color:#fff;
border:none;
border-radius:var(--radius);
cursor:pointer;
font-size:13px;
font-weight:500;
white-space:nowrap;
transition:background .12s,opacity .12s;
flex-shrink:0;
}
.btn-primary:hover{background:var(--accent-hover);}
.btn-primary.btn-sm{padding:5px 11px;font-size:12px;}
.btn-ghost{
display:inline-flex;
align-items:center;
gap:5px;
padding:5px 10px;
background:transparent;
border:1px solid var(--border);
border-radius:var(--radius);
cursor:pointer;
font-size:12px;
color:var(--text-2);
transition:background .1s,border-color .1s,color .1s;
white-space:nowrap;
}
.btn-ghost:hover{background:var(--bg-4);border-color:var(--border-2);}
.btn-ghost.btn-sm{padding:4px 9px;font-size:11.5px;}
.btn-ghost.text-red:hover{color:var(--red);border-color:var(--red-dim);}
.video-grid{
display:flex;
flex-direction:column;
gap:1px;
}
.video-card{
display:flex;
align-items:center;
gap:12px;
background:var(--bg-2);
border:1px solid var(--border);
border-radius:var(--radius);
padding:10px 12px;
transition:background .1s,border-color .12s;
cursor:default;
}
.video-card:hover{background:var(--bg-3);border-color:var(--border-2);}
.video-card.selected{background:var(--bg-3);border-color:var(--accent-dim);}
.video-card+.video-card{margin-top:3px;}
.card-check{
flex-shrink:0;
cursor:pointer;
position:relative;
}
.card-check input[type=checkbox]{
position:absolute;
opacity:0;
width:16px;
height:16px;
cursor:pointer;
}
.checkmark{
width:16px;
height:16px;
border:1px solid var(--border-2);
border-radius:4px;
background:var(--bg-4);
display:flex;
align-items:center;
justify-content:center;
transition:background .1s,border-color .1s;
pointer-events:none;
color:var(--accent);
}
.video-card.selected .checkmark{background:var(--accent-dim);border-color:var(--accent);}
.card-thumb{
width:96px;
height:54px;
border-radius:5px;
overflow:hidden;
background:var(--bg-4);
flex-shrink:0;
cursor:pointer;
position:relative;
}
.card-thumb img{width:100%;height:100%;object-fit:cover;}
.thumb-overlay{
position:absolute;inset:0;
display:flex;align-items:center;justify-content:center;
background:rgba(0,0,0,.45);
opacity:0;
transition:opacity .15s;
color:var(--text-3);
}
.card-thumb:hover .thumb-overlay{opacity:1;}
.card-thumb.thumb-err{display:flex;align-items:center;justify-content:center;color:var(--text-4);}
.card-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px;}
.card-header{display:flex;align-items:center;gap:8px;}
.card-title{
font-size:13.5px;
font-weight:500;
color:var(--text);
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
flex:1;
}
.card-meta{
display:flex;
align-items:center;
gap:10px;
font-size:11.5px;
color:var(--text-4);
flex-wrap:wrap;
}
.card-author{color:var(--text-3);}
.card-id{
font-family:var(--mono);
font-size:11px;
color:var(--text-4);
cursor:pointer;
display:flex;
align-items:center;
gap:4px;
transition:color .1s;
}
.card-id:hover{color:var(--text-2);}
.card-date{color:var(--text-4);}
.card-error{
font-size:11.5px;
color:var(--red);
display:flex;
align-items:center;
gap:5px;
}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;}
.tag{
display:inline-flex;
align-items:center;
gap:3px;
font-size:10.5px;
padding:2px 7px;
background:var(--bg-5);
border:1px solid var(--border);
border-radius:10px;
color:var(--text-3);
}
.card-actions{
display:flex;
align-items:center;
gap:3px;
flex-shrink:0;
}
.icon-btn{
width:28px;
height:28px;
display:flex;
align-items:center;
justify-content:center;
background:transparent;
border:1px solid transparent;
border-radius:var(--radius);
cursor:pointer;
color:var(--text-3);
transition:background .1s,border-color .1s,color .1s;
}
.icon-btn:hover{background:var(--bg-5);border-color:var(--border);color:var(--text-2);}
.icon-btn-danger:hover{color:var(--red)!important;border-color:var(--red-dim)!important;}
.icon-btn-spin{cursor:default;color:var(--text-4);}
.badge{
display:inline-flex;
align-items:center;
gap:4px;
font-size:10.5px;
font-weight:500;
padding:2px 8px;
border-radius:10px;
white-space:nowrap;
font-family:var(--mono);
}
.badge-green{background:var(--green-dim);color:var(--green);}
.badge-yellow{background:var(--yellow-dim);color:var(--yellow);}
.badge-blue{background:var(--blue-dim);color:var(--blue);}
.badge-red{background:var(--red-dim);color:var(--red);}
.badge-gray{background:var(--bg-5);color:var(--text-3);}
.empty-state{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:10px;
padding:64px 32px;
color:var(--text-4);
}
.empty-icon{color:var(--bg-5);opacity:.7;}
.empty-title{font-size:15px;font-weight:500;color:var(--text-3);}
.empty-sub{font-size:12.5px;color:var(--text-4);}
.queue-list{display:flex;flex-direction:column;gap:3px;}
.queue-item{
display:flex;
align-items:center;
gap:12px;
background:var(--bg-2);
border:1px solid var(--border);
border-radius:var(--radius);
padding:10px 12px;
}
.queue-thumb{
width:72px;height:40px;
border-radius:4px;
overflow:hidden;
background:var(--bg-4);
flex-shrink:0;
}
.queue-thumb img{width:100%;height:100%;object-fit:cover;}
.queue-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px;}
.queue-title{font-size:13px;font-weight:450;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.queue-id{font-size:11px;font-family:var(--mono);color:var(--text-4);}
.queue-status{flex-shrink:0;}
.modal-backdrop{
position:fixed;inset:0;
background:rgba(0,0,0,.65);
display:flex;
align-items:center;
justify-content:center;
z-index:100;
padding:24px;
backdrop-filter:blur(3px);
}
.modal{
background:var(--bg-2);
border:1px solid var(--border-2);
border-radius:var(--radius-lg);
width:100%;
max-width:640px;
max-height:calc(100vh - 48px);
overflow-y:auto;
display:flex;
flex-direction:column;
box-shadow:0 24px 64px rgba(0,0,0,.6);
}
.modal-header{
display:flex;
align-items:center;
justify-content:space-between;
padding:16px 18px 14px;
border-bottom:1px solid var(--border);
}
.modal-title{font-size:14px;font-weight:500;color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-right:12px;}
.modal-close{
width:26px;height:26px;
display:flex;align-items:center;justify-content:center;
background:transparent;
border:none;
cursor:pointer;
border-radius:5px;
color:var(--text-3);
transition:background .1s;
}
.modal-close:hover{background:var(--bg-5);}
.modal-body{padding:18px;}
.embed-wrap{
width:100%;
padding-top:56.25%;
position:relative;
border-radius:var(--radius);
overflow:hidden;
background:var(--bg-4);
margin-bottom:16px;
}
.embed-wrap iframe{position:absolute;inset:0;width:100%;height:100%;}
.modal-meta{
display:flex;
flex-direction:column;
gap:6px;
background:var(--bg-3);
border:1px solid var(--border);
border-radius:var(--radius);
padding:12px;
margin-bottom:14px;
}
.meta-row{display:flex;align-items:center;gap:10px;}
.meta-k{font-size:11.5px;color:var(--text-4);width:72px;flex-shrink:0;}
.meta-v{font-size:12.5px;color:var(--text-2);}
.mono{font-family:var(--mono);font-size:12px;}
.link{color:var(--accent);text-decoration:none;}
.link:hover{text-decoration:underline;}
.modal-notes,.modal-tags{margin-bottom:12px;}
.notes-label{display:block;font-size:11.5px;color:var(--text-4);margin-bottom:5px;font-weight:500;}
.notes-input{
width:100%;
background:var(--bg-3);
border:1px solid var(--border);
border-radius:var(--radius);
padding:8px 10px;
color:var(--text);
font-size:13px;
resize:vertical;
min-height:64px;
outline:none;
transition:border-color .15s;
}
.notes-input:focus{border-color:var(--border-2);}
.tag-input{
width:100%;
background:var(--bg-3);
border:1px solid var(--border);
border-radius:var(--radius);
padding:7px 10px;
color:var(--text);
font-size:13px;
outline:none;
transition:border-color .15s;
}
.tag-input:focus{border-color:var(--border-2);}
.modal-footer{
display:flex;
gap:8px;
padding:12px 18px 16px;
border-top:1px solid var(--border);
}
.toast{
position:fixed;
bottom:24px;
right:24px;
display:flex;
align-items:center;
gap:8px;
padding:9px 14px;
border-radius:var(--radius);
background:var(--bg-3);
border:1px solid var(--border-2);
color:var(--text);
font-size:13px;
z-index:200;
opacity:0;
transform:translateY(8px);
transition:opacity .18s,transform .18s;
pointer-events:none;
box-shadow:0 8px 24px rgba(0,0,0,.4);
max-width:340px;
}
.toast.show{opacity:1;transform:translateY(0);}
.toast-success{border-color:var(--green-dim);color:var(--green);}
.toast-error{border-color:var(--red-dim);color:var(--red);}
.toast-warn{border-color:var(--yellow-dim);color:var(--yellow);}
.toast-info{border-color:var(--border-2);}
.toast-icon{display:flex;align-items:center;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.spin{animation:spin .9s linear infinite;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bg-5);border-radius:10px;}
::-webkit-scrollbar-thumb:hover{background:var(--border-2);}
select option{background:var(--bg-3);}
@media(max-width:720px){
:root{--sidebar:52px;}
.nav-label,.logo-text,.sidebar-stats,.sidebar-actions span,.stat-label{display:none;}
.sidebar-logo{justify-content:center;padding:14px 0;}
.logo-text{display:none;}
.logo-mark{margin:0 auto;}
.nav-item{justify-content:center;padding:10px;}
.nav-badge{display:none;}
.sidebar-btn{justify-content:center;}
.sidebar-btn span{display:none;}
.view-wrap{padding:18px 16px 32px;}
.search-input{width:130px;}
}
</style>
</head>
<body>
<div id="app"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#52525b;font-size:13px;font-family:'IBM Plex Mono',monospace;">Loading...</div></div>
<script type="module">
import{init}from'./engine.js';
document.addEventListener('DOMContentLoaded',()=>init().catch(console.error));
</script>
</body>
</html>
